version: "3"

env:
  PGM_NAME: legal-learn
  LEGAL_QMD_DB: ../legal-ko/.qmd/data.db
  CHECKPOINT_DIR: checkpoints

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  fmt:
    desc: Format code
    cmds:
      - cargo fmt --all

  check:
    desc: Type-check the project
    cmds:
      - cargo check

  clippy:
    desc: Run clippy lints
    cmds:
      - cargo clippy -- -D warnings

  test:
    desc: Run unit tests
    cmds:
      - cargo test

  check:all:
    desc: Run format check, clippy, and tests
    cmds:
      - cargo fmt --all --check
      - cargo clippy -- -D warnings
      - cargo test

  build:
    desc: Build the release binary
    cmds:
      - cargo build --release

  run:
    desc: Run the CLI with custom arguments
    cmds:
      - cargo run -- {{.CLI_ARGS}}

  inspect:
    desc: Inspect ../legal-ko/.qmd/data.db and print corpus stats
    cmds:
      - cargo run -- inspect --db "{{.LEGAL_QMD_DB}}" {{.CLI_ARGS}}

  inspect:json:
    desc: Inspect ../legal-ko/.qmd/data.db and print JSON stats
    cmds:
      - cargo run -- inspect --db "{{.LEGAL_QMD_DB}}" --json {{.CLI_ARGS}}

  train:
    desc: Train the Burn model on ../legal-ko/.qmd/data.db
    cmds:
      - cargo run -- train --db "{{.LEGAL_QMD_DB}}" --output "{{.CHECKPOINT_DIR}}" {{.CLI_ARGS}}

  train:smoke:
    desc: Run a tiny local smoke-training pass
    cmds:
      - cargo run -- train --db "{{.LEGAL_QMD_DB}}" --output "{{.CHECKPOINT_DIR}}/smoke" --epochs 1 --batch-size 4 {{.CLI_ARGS}}

  train:release:
    desc: Train using the release binary
    deps: [build]
    cmds:
      - target/release/$PGM_NAME train --db "{{.LEGAL_QMD_DB}}" --output "{{.CHECKPOINT_DIR}}" {{.CLI_ARGS}}

  train:release:smoke:
    desc: Run a tiny smoke-training pass with the release binary
    deps: [build]
    cmds:
      - target/release/$PGM_NAME train --db "{{.LEGAL_QMD_DB}}" --output "{{.CHECKPOINT_DIR}}/smoke" --epochs 1 --batch-size 4 {{.CLI_ARGS}}

  train:debug:
    desc: Run a tiny debug training repro on a small pair subset
    cmds:
      - cargo run -- train --db "{{.LEGAL_QMD_DB}}" --output "{{.CHECKPOINT_DIR}}/smoke" --epochs 1 --batch-size 4 --limit 32 {{.CLI_ARGS}}

  train:tiny:
    desc: Run the smallest practical release training sanity check
    deps: [build]
    cmds:
      - target/release/$PGM_NAME train --db "{{.LEGAL_QMD_DB}}" --output "{{.CHECKPOINT_DIR}}/smoke" --epochs 1 --batch-size 2 --limit 8 {{.CLI_ARGS}}

  train:fast:
    desc: Fast iteration with small model (release, 64 pairs, 5 epochs)
    deps: [build]
    cmds:
      - target/release/$PGM_NAME train --db "{{.LEGAL_QMD_DB}}" --output "{{.CHECKPOINT_DIR}}/fast" --epochs 5 --batch-size 32 --limit 64 --small {{.CLI_ARGS}}

  export:
    desc: Export learned embeddings back into ../legal-ko/.qmd/data.db
    cmds:
      - cargo run -- export --db "{{.LEGAL_QMD_DB}}" --checkpoint "{{.CHECKPOINT_DIR}}" {{.CLI_ARGS}}

  export:release:
    desc: Export embeddings using the release binary
    deps: [build]
    cmds:
      - target/release/$PGM_NAME export --db "{{.LEGAL_QMD_DB}}" --checkpoint "{{.CHECKPOINT_DIR}}" {{.CLI_ARGS}}

  distill:generate:
    desc: Generate teacher embeddings from llama-embedding (EmbeddingGemma-300M)
    deps: [build]
    cmds:
      - target/release/$PGM_NAME distill-generate --db "{{.LEGAL_QMD_DB}}" --output "{{.CHECKPOINT_DIR}}/teacher_embeddings.jsonl" {{.CLI_ARGS}}

  distill:generate:fast:
    desc: Generate teacher embeddings for 500 pairs only
    deps: [build]
    cmds:
      - target/release/$PGM_NAME distill-generate --db "{{.LEGAL_QMD_DB}}" --output "{{.CHECKPOINT_DIR}}/teacher_embeddings.jsonl" --limit 500 {{.CLI_ARGS}}

  distill:train:
    desc: Train student model via distillation from teacher embeddings
    deps: [build]
    cmds:
      - target/release/$PGM_NAME distill-train --db "{{.LEGAL_QMD_DB}}" --teacher "{{.CHECKPOINT_DIR}}/teacher_embeddings.jsonl" --output "{{.CHECKPOINT_DIR}}/distilled" {{.CLI_ARGS}}

  distill:train:fast:
    desc: Distill with small model, 5 epochs
    deps: [build]
    cmds:
      - target/release/$PGM_NAME distill-train --db "{{.LEGAL_QMD_DB}}" --teacher "{{.CHECKPOINT_DIR}}/teacher_embeddings.jsonl" --output "{{.CHECKPOINT_DIR}}/distilled" --small --epochs 5 {{.CLI_ARGS}}

  distill:
    desc: Full distillation pipeline (generate teachers then train)
    deps: [build]
    cmds:
      - task: distill:generate
      - task: distill:train

  plot:
    desc: Plot per-epoch loss comparison across checkpoint runs
    cmds:
      - uv run scripts/plot_loss.py --checkpoints-dir "{{.CHECKPOINT_DIR}}" {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean
